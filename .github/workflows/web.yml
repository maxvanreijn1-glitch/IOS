name: Web App CI

on:
  push:
    branches: [main, master, copilot/**]
    paths-ignore:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost/placeholder' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://placeholder:placeholder@localhost/placeholder' }}
