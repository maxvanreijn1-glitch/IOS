name: Mobile App CI

on:
  push:
    branches: [main, master, copilot/**]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'

jobs:
  # ─── Lint & Type-Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  # ─── Android Build (Expo) ───────────────────────────────────────────────────
  build-android:
    name: Build Android (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Export Android bundle (Metro check)
        run: npx expo export --platform android --output-dir /tmp/android-export
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'http://localhost:3000' }}

      - name: Upload Android export
        uses: actions/upload-artifact@v4
        with:
          name: android-export
          path: /tmp/android-export
          retention-days: 7

  # ─── iOS Build (Expo) ───────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (Expo)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Export iOS bundle (Metro check)
        run: npx expo export --platform ios --output-dir /tmp/ios-export
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'http://localhost:3000' }}

      - name: Upload iOS export
        uses: actions/upload-artifact@v4
        with:
          name: ios-export
          path: /tmp/ios-export
          retention-days: 7
